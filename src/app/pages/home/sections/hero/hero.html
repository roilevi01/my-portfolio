<section #heroSection id="resume" class="hero section section--hero">
  <div class="hero-bg" aria-hidden="true"></div>

  <div class="hero__inner">
    <h1 class="hero-title">
      <span class="greeting">Hi, I'm</span>

      <span class="name" aria-label="Roi Levi">
        <ng-container *ngFor="let ch of nameChars; let i = index">
          <span class="letter" [style.--i]="i">
            {{ ch === ' ' ? '\u00A0' : ch }}
          </span>
        </ng-container>
      </span>

      <span class="role">Full Stack Developer</span>
    </h1>

    <p class="hero-sub">
      Building clean, scalable web apps with modern UI/UX and smooth interactions.
    </p>

    <div class="hero-actions">
      <a
        class="btn-primary"
        href="assets/CV_Roi_Levi_FullStack.pdf"
        download="Roi_Levi_FullStack_CV.pdf"
        aria-label="Download Roi Levi's CV"
      >
        <span aria-hidden="true">📄</span>
        <span>Download CV</span>
      </a>

      <a class="btn-ghost" href="#contact" aria-label="Go to contact section">
        Contact
      </a>
    </div>
  </div>
</section>
