<section id="services" class="services section">
  <div class="services__inner">
    <header class="services__head" [appRevealOnScroll]="'reveal'">
      <span class="services__label">WHAT I DO</span>
      <h2 class="section-title">My <span class="gradient-text">Services</span></h2>
      <p class="subtitle">
        What I can build for you — clean, fast, and production-ready.
      </p>
    </header>

    <div class="services__grid">
      <article
        class="services__card"
        *ngFor="let s of services; let i = index"
        [style.--d]="(i * 90) + 'ms'"
        [appRevealOnScroll]="'reveal reveal--up'"
      >
        <div class="services__icon-wrap" aria-hidden="true">
          <span class="services__icon">{{ s.icon }}</span>
        </div>
        <span class="services__step">0{{ i + 1 }}</span>
        <h3>{{ s.title }}</h3>
        <p class="services__desc">{{ s.description }}</p>

        <div class="services__tags">
          <span class="services__tag" *ngFor="let t of s.tags">{{ t }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
