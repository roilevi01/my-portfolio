<div
  class="snackbar"
  role="status"
  aria-live="polite"
  [class.is-exiting]="isExiting"
  [class.is-success]="type === 'success'"
  [class.is-error]="type === 'error'"
>
  <span class="icon" aria-hidden="true">
    {{ type === "success" ? "✓" : "!" }}
  </span>

  <span class="text">{{ message }}</span>
</div>
